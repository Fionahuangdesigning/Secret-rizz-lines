<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Sentence Brush — Helvetica (Fixed Sizing)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
  <style>
    /* Page UI can still use a stack; p5 canvas will use a single family name */
    :root { --uiFont: "Helvetica", "Arial", sans-serif; }

    html, body { margin:0; padding:0; height:100%; background:#fff; color:#000; }
    body { touch-action:none; font-family: var(--uiFont); }
    canvas { display:block; }

    .hint {
      position: fixed; left: 12px; bottom: 12px;
      background: rgba(255,255,255,.95);
      padding: 6px 10px; border-radius: 8px;
      font: 12px/1.3 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      box-shadow: 0 2px 6px rgba(0,0,0,.06);
      z-index: 9999;
      display: flex; gap: 8px; align-items: center;
    }
    .btn {
      padding: 2px 8px; border-radius: 6px; border: 1px solid #ccc;
      cursor: pointer; user-select: none; background: #fff;
    }
    .btn:active { transform: translateY(1px); }
  </style>
</head>
<body>
  <div class="hint" id="hintBox">
    <span>Drag to write · SPACE: new line · +/-: size</span>
    <button class="btn" id="minusBtn">−</button>
    <button class="btn" id="plusBtn">+</button>
    <span id="sizeReadout">(42px)</span>
  </div>

  <script>
  // ----- Sentences -----
  const LINES = [
    "Are you tteokbokki? Because you’re hot and a little bit sweet.",
    "You make my heart go bap-bap like kimbap.",
    "You must be ramyeon, because I’m instant-ly in love.",
    "You don’t want me? That’s a big oppatunity you’ll miss.",
    "I’m not a trainee, but I’ve been practicing falling for you.",
    "Are you bulgogi? Because you meat all my expectations.",
    "Without you, I’m just a lonely banchan (side dish)."
  ];
  const pickLine = () => LINES[Math.floor(Math.random()*LINES.length)];

  // ----- p5 text font: SINGLE family name only -----
  const CANVAS_FONT_PRIMARY = "Helvetica";  // try this first
  const CANVAS_FONT_FALLBACK = "Arial";     // fallback if Helvetica missing
  let CANVAS_FONT = CANVAS_FONT_PRIMARY;

  // Brush state
  let phrase = "";
  let charIndex = 0;
  let carry = 0;
  let brushSize = 42;
  const rotateWithStroke = false; // rotation always OFF

  // Glyphs
  const TTL_MS = 1000;
  let glyphs = [];

  // Drag state
  let isDragging = false;
  let px = 0, py = 0;

  function setup(){
    createCanvas(windowWidth, windowHeight);
    textAlign(LEFT, CENTER);
    // Try Helvetica; if metrics look suspicious, fall back to Arial.
    textFont(CANVAS_FONT);
    if (!fontSeemsValid()) {
      CANVAS_FONT = CANVAS_FONT_FALLBACK;
      textFont(CANVAS_FONT);
    }

    noStroke();
    newSentence();
    background(255);
    attachUI();
    updateHint();
  }

  function windowResized(){ resizeCanvas(windowWidth, windowHeight); }

  function draw(){
    background(255);

    const now = millis();
    for (let i = glyphs.length - 1; i >= 0; i--) {
      const g = glyphs[i];
      const age = now - g.born;
      if (age > TTL_MS) {
        glyphs.splice(i, 1);
      } else {
        const t = age / TTL_MS;
        const eased = 1 - (1 - t) * (1 - t);
        const alpha = 255 * (1 - eased);

        push();
        translate(g.x, g.y);
        fill(0, alpha);
        textFont(CANVAS_FONT);
        textSize(g.size);
        text(g.ch, 0, 0);
        pop();
      }
    }
  }

  function mousePressed(){
    isDragging = true;
    px = mouseX; py = mouseY;
    newSentence();
  }

  function mouseDragged(){
    if (!isDragging) return;
    placeCharsAlongSegment(px, py, mouseX, mouseY);
    px = mouseX; py = mouseY;
  }

  function mouseReleased(){ isDragging = false; }

  function placeCharsAlongSegment(x1, y1, x2, y2){
    const dx = x2 - x1, dy = y2 - y1;
    const segLen = Math.hypot(dx, dy);
    if (segLen === 0) return;

    const angle = 0; // rotation OFF

    push();
    textFont(CANVAS_FONT);   // <<< single family name
    textSize(brushSize);
    let s = carry;
    while (s < segLen) {
      const ch = phrase.charAt(charIndex);
      const t = s / segLen;
      const x = x1 + dx * t;
      const y = y1 + dy * t;

      glyphs.push({ x, y, angle, ch, size: brushSize, born: millis() });

      const adv = Math.max(1, textWidth(ch)); // depends on current font+size
      s += adv;
      charIndex = (charIndex + 1) % phrase.length;
    }
    carry = s - segLen;
    pop();
  }

  function newSentence(){
    const s = pickLine();
    phrase = " " + s + " ";
    charIndex = 0;
  }

  function updateHint(){
    document.getElementById("sizeReadout").textContent = `(${brushSize}px)`;
  }

  // UI + keys (with on-screen buttons, in case browser eats +/-)
  function attachUI(){
    document.getElementById('plusBtn').addEventListener('click', () => {
      brushSize = Math.min(200, brushSize + 4);
      updateHint();
    });
    document.getElementById('minusBtn').addEventListener('click', () => {
      brushSize = Math.max(8, brushSize - 4);
      updateHint();
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === ' ') { e.preventDefault(); newSentence(); return; }
      if ((e.key === '+' || e.key === '=') && !e.metaKey && !e.ctrlKey) {
        e.preventDefault(); brushSize = Math.min(200, brushSize + 4); updateHint(); return;
      }
      if ((e.key === '-' || e.key === '_') && !e.metaKey && !e.ctrlKey) {
        e.preventDefault(); brushSize = Math.max(8, brushSize - 4); updateHint(); return;
      }
    }, { passive: false });
  }

  // Sanity check: ensure current font yields sensible metrics in p5
  function fontSeemsValid(){
    // Measure 'M' at two sizes; widths should differ and be > 0
    textSize(20);
    const w1 = textWidth('M');
    textSize(60);
    const w2 = textWidth('M');
    return (w1 > 0 && w2 > 0 && Math.abs(w2 - w1) > 5);
  }
  </script>
</body>
</html>
